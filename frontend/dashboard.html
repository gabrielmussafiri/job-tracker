<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker — Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <nav class="nav">
        <h1><i class="fas fa-chart-line"></i> My Applications</h1>
        <div class="nav-buttons">
          <button onclick="goToAddJob()" class="primary">
            <i class="fas fa-plus"></i> Add Job
          </button>
          <button onclick="logout()" class="danger">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </nav>

      <!-- Stats -->
      <section class="stats" id="stats">
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-list"></i></div>
          <h3 id="total">0</h3>
          <p>Total</p>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-paper-plane"></i></div>
          <h3 id="applied">0</h3>
          <p>Applied</p>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-comments"></i></div>
          <h3 id="interview">0</h3>
          <p>Interview</p>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-handshake"></i></div>
          <h3 id="offer">0</h3>
          <p>Offer</p>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-times-circle"></i></div>
          <h3 id="rejected">0</h3>
          <p>Rejected</p>
        </div>
      </section>

      <!-- Jobs List -->
      <section id="jobs-list" class="jobs-section">
        <h2><i class="fas fa-briefcase"></i> Your Jobs</h2>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
