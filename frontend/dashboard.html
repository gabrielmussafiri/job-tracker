<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker — Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <nav class="nav">
        <h1><i class="fas fa-chart-line"></i> My Applications</h1>
        <div class="nav-buttons">
          <button onclick="goToAddJob()" class="primary">
            <i class="fas fa-plus"></i> Add Job
          </button>
          <button onclick="logout()" class="danger">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </nav>

      <!-- Stats -->
      <section class="stats" id="stats">
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-list"></i></div>
          <h3 id="total">0</h3>
          <p>Total</p>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-paper-plane"></i></div>
          <h3 id="applied">0</h3>
          <p>Applied</p>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-comments"></i></div>
          <h3 id="interview">0</h3>
          <p>Interview</p>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-handshake"></i></div>
          <h3 id="offer">0</h3>
          <p>Offer</p>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-times-circle"></i></div>
          <h3 id="rejected">0</h3>
          <p>Rejected</p>
        </div>
      </section>

      <!-- Jobs List -->
      <section id="jobs-list" class="jobs-section">
        <h2><i class="fas fa-briefcase"></i> Your Jobs</h2>
      </section>
    </div>

    <!-- Edit Job Modal -->
    <div id="editModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2><i class="fas fa-edit"></i> Edit Job</h2>
          <button class="modal-close" onclick="closeEditModal()">&times;</button>
        </div>
        <form onsubmit="event.preventDefault(); saveJobChanges()">
          <div class="form-group">
            <label for="edit-company"><i class="fas fa-building"></i> Company Name</label>
            <input type="text" id="edit-company" placeholder="Company name" required />
          </div>
          <div class="form-group">
            <label for="edit-role"><i class="fas fa-user-tie"></i> Job Role</label>
            <input type="text" id="edit-role" placeholder="Job role" required />
          </div>
          <div class="form-group">
            <label for="edit-status"><i class="fas fa-tasks"></i> Status</label>
            <select id="edit-status" required>
              <option value="applied">Applied</option>
              <option value="interview">Interview</option>
              <option value="offer">Offer</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>
          <div class="modal-actions">
            <button type="submit" class="primary"><i class="fas fa-save"></i> Save Changes</button>
            <button type="button" class="secondary" onclick="closeEditModal()"><i class="fas fa-times"></i> Cancel</button>
          </div>
          <p id="edit-message"></p>
        </form>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
