<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker — Add Job</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <nav class="nav">
        <h1><i class="fas fa-plus-circle"></i> Add New Job</h1>
        <button onclick="goToDashboard()" class="secondary">
          <i class="fas fa-arrow-left"></i> Back
        </button>
      </nav>

      <div class="card">
        <form
          onsubmit="
            event.preventDefault();
            addJob();
          "
        >
          <div class="form-group">
            <label for="company"
              ><i class="fas fa-building"></i> Company Name</label
            >
            <input
              type="text"
              id="company"
              placeholder="e.g., Google"
              required
            />
          </div>
          <div class="form-group">
            <label for="role"><i class="fas fa-user-tie"></i> Job Role</label>
            <input
              type="text"
              id="role"
              placeholder="e.g., Software Engineer"
              required
            />
          </div>
          <div class="form-group">
            <label for="status"><i class="fas fa-tasks"></i> Status</label>
            <select id="status" required>
              <option value="applied">Applied</option>
              <option value="interview">Interview</option>
              <option value="offer">Offer</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>
          <button type="submit" class="primary">
            <i class="fas fa-save"></i> Save Job
          </button>
        </form>
        <p id="message"></p>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
